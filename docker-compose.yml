version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=12345
      - DB_NAME=postgres
      - DB_PORT=5432
  db:
    image: g67-db:latest
    ports:
      - "5432:5432"
    container_name: g67-db
